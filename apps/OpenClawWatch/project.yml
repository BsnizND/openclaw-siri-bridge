name: OpenClawWatch
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "14"
    MARKETING_VERSION: "0.1.3"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  OpenClawCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
        excludes:
          - PrivateAssets.xcassets
      - path: Sources/iOS
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: Claw Bridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ClawBridgeDefaultBaseURL: $(CLAW_BRIDGE_DEFAULT_BASE_URL)
        ClawBridgeDefaultBearerToken: $(CLAW_BRIDGE_DEFAULT_BEARER_TOKEN)
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: Claw Bridge can relay Watch voice messages to your configured OpenClaw bridge.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briansnyder.ClawBridge
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: OpenClawWatchApp
        embed: true
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    sources:
      - path: Sources/Shared/PublicAssets.xcassets
    dependencies:
      - target: OpenClawWatchExtension
      - target: ClawBridgeComplicationExtension
        embed: true
    info:
      path: Sources/Watch/Info.plist
      properties:
        CFBundleDisplayName: Claw Bridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.briansnyder.ClawBridge.watchkitapp
            CFBundleURLSchemes:
              - clawbridge
        NSLocationWhenInUseUsageDescription: Claw Bridge can attach your current location to Watch voice messages when you allow it.
        NSLocationTemporaryUsageDescriptionDictionary:
          PreciseWatchVoiceMessage: Claw Bridge can attach precise location to a voice message when you ask location-aware questions.
        WKCompanionAppBundleIdentifier: com.briansnyder.ClawBridge
        WKWatchKitApp: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.briansnyder.ClawBridge.watchkitapp
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    sources:
      - path: Sources/Shared
        excludes:
          - PrivateAssets.xcassets
      - path: Sources/Watch
        excludes:
          - Info.plist
          - Resources/AssistantPortrait.*
    info:
      path: Sources/WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Claw Bridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ClawBridgeDefaultBaseURL: $(CLAW_BRIDGE_DEFAULT_BASE_URL)
        ClawBridgeDefaultBearerToken: $(CLAW_BRIDGE_DEFAULT_BEARER_TOKEN)
        NSMicrophoneUsageDescription: Claw Bridge records audio only when you press the Watch push-to-talk control.
        NSLocationWhenInUseUsageDescription: Claw Bridge can attach your current location to Watch voice messages when you allow it.
        NSLocationTemporaryUsageDescriptionDictionary:
          PreciseWatchVoiceMessage: Claw Bridge can attach precise location to a voice message when you ask location-aware questions.
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: com.briansnyder.ClawBridge.watchkitapp
          NSExtensionPointIdentifier: com.apple.watchkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briansnyder.ClawBridge.watchkitapp.watchkitextension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  ClawBridgeComplicationExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: Sources/Complication
    info:
      path: Sources/Complication/Info.plist
      properties:
        CFBundleDisplayName: Claw Bridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briansnyder.ClawBridge.watchkitapp.ClawBridgeComplicationExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
