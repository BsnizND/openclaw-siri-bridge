name: OpenClawWatch
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "2"
    MARKETING_VERSION: "0.1.1"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  OpenClawCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
        excludes:
          - PrivateAssets.xcassets
      - path: Sources/iOS
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: Jay Bridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        JayBridgeDefaultBaseURL: $(JAY_BRIDGE_DEFAULT_BASE_URL)
        JayBridgeDefaultBearerToken: $(JAY_BRIDGE_DEFAULT_BEARER_TOKEN)
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: Jay Bridge can relay Watch voice messages to your configured OpenClaw bridge.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briansnyder.JayBridge
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: OpenClawWatchApp
        embed: true
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: Sources/Shared
        excludes:
          - PrivateAssets.xcassets
      - path: Sources/Watch
        excludes:
          - Resources/AssistantPortrait.*
    info:
      path: Sources/Watch/Info.plist
      properties:
        CFBundleDisplayName: Jay
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        JayBridgeDefaultBaseURL: $(JAY_BRIDGE_DEFAULT_BASE_URL)
        JayBridgeDefaultBearerToken: $(JAY_BRIDGE_DEFAULT_BEARER_TOKEN)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.briansnyder.JayBridge
        NSMicrophoneUsageDescription: Jay Bridge records audio only when you press the Watch push-to-talk control.
        NSLocationWhenInUseUsageDescription: Jay Bridge can attach your current location to Watch voice messages when you allow it.
        NSLocationTemporaryUsageDescriptionDictionary:
          PreciseWatchVoiceMessage: Jay Bridge can attach precise location to a voice message when you ask location-aware questions.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.briansnyder.JayBridge.watchkitapp
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
